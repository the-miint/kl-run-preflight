<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Preflight Schema</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap');

  :root {
    --bg: #0e1117;
    --surface: #161b22;
    --surface-hover: #1c2129;
    --border: #30363d;
    --border-accent: #58a6ff;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --pk: #f0883e;
    --fk: #58a6ff;
    --ref-table: #3fb950;
    --core-table: #d2a8ff;
    --platform-table: #f778ba;
    --workflow-table: #79c0ff;
    --legacy-table: #ffa657;
    --uncategorized-table: #8b949e;
    --view-color: #56d364;
    --link-line: #30363d;
    --link-line-hover: #58a6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }

  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
  }

  #toolbar h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }

  #toolbar .sep {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
  }

  #toolbar button {
    background: var(--surface-hover);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
  }
  #toolbar button:hover { border-color: var(--border-accent); color: var(--text); }

  svg {
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  svg:active { cursor: grabbing; }

  .table-group { cursor: move; }
  .table-group:hover .table-bg { stroke: var(--border-accent); }

  .table-bg {
    fill: var(--surface);
    stroke: var(--border);
    stroke-width: 1;
    rx: 6;
  }

  .table-header-bg { rx: 6; }
  .table-header-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    fill: var(--bg);
  }

  .column-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    fill: var(--text-muted);
  }
  .column-text.pk { fill: var(--pk); }
  .column-text.fk { fill: var(--fk); }

  .type-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    fill: var(--text-dim);
  }

  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    font-weight: 600;
  }

  .link-line {
    fill: none;
    stroke: var(--link-line);
    stroke-width: 1.2;
    stroke-dasharray: 4,3;
    pointer-events: none;
  }

  .view-group { cursor: move; }
  .view-group:hover .view-bg { stroke: var(--view-color); }

  .view-bg {
    fill: none;
    stroke: var(--border);
    stroke-width: 1;
    stroke-dasharray: 3,2;
    rx: 6;
  }

  .view-header-bg {
    fill: var(--view-color);
    opacity: 0.15;
    rx: 6;
  }
  .view-header-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    fill: var(--view-color);
  }

  #tooltip {
    position: fixed;
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'IBM Plex Mono', monospace;
    z-index: 200;
    pointer-events: none;
    max-width: 320px;
    line-height: 1.5;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
</style>
</head>

    },

    },

var CATEGORY_COLORS = {
  ref: 'var(--ref-table)',
  core: 'var(--core-table)',
  platform: 'var(--platform-table)',
  workflow: 'var(--workflow-table)',
  legacy: 'var(--legacy-table)',
  uncategorized: 'var(--uncategorized-table)'
};

var COL_W = 260, ROW_H = 18, HEADER_H = 26, PAD = 8;

function tableHeight(t) { return HEADER_H + t.columns.length * ROW_H + PAD; }

var POSITIONS = {
  'assay_type': { x: 40, y: 60 },
  'sequencing_platform': { x: 40, y: 146 },
  'sample_type': { x: 40, y: 232 },
  'project': { x: 380, y: 60 },
  'input_plate': { x: 380, y: 254 },
  'input_sample': { x: 380, y: 376 },
  'processing_run': { x: 380, y: 552 },
  'compression_sample': { x: 380, y: 800 },
  'prepped_sample': { x: 380, y: 922 },
  'illumina_run': { x: 720, y: 60 },
  'illumina_sample': { x: 720, y: 272 },
  'tellseq_sample': { x: 720, y: 448 },
  'pacbio_sample': { x: 720, y: 570 },
  'metagenomic_absquant_sample': { x: 1020, y: 60 },
  'metatranscriptomic_sample': { x: 1020, y: 254 },
  'katharoseq_sample': { x: 1020, y: 340 },
  'legacy_section_format': { x: 40, y: 318 },
  'legacy_samplesheet_format': { x: 40, y: 386 },
  'legacy_samplesheet_view': { x: 40, y: 490 },
  'legacy_samplesheet_optional_columns': { x: 40, y: 630 },
  'legacy_extra_column': { x: 40, y: 788 },
  'change_log': { x: 380, y: 1062 }
};

var VIEW_POSITIONS = {
  'control_project_associations': { x: 40, y: 1300 },
  'input_plate_projects': { x: 320, y: 1300 },
  'omnibus_abs_quant_metag_v10_data': { x: 600, y: 1300 },
  'omnibus_contact': { x: 880, y: 1300 },
  'omnibus_illumina_header': { x: 1160, y: 1300 },
  'omnibus_illumina_reads': { x: 40, y: 1336 },
  'omnibus_illumina_settings': { x: 320, y: 1336 },
  'omnibus_pacbio_absquant_v10_data': { x: 600, y: 1336 },
  'omnibus_pacbio_absquant_v11_bioinformatics': { x: 880, y: 1336 },
  'omnibus_pacbio_absquant_v11_data': { x: 1160, y: 1336 },
  'omnibus_pacbio_absquant_v11_header': { x: 40, y: 1372 },
  'omnibus_pacbio_absquant_v12_data': { x: 320, y: 1372 },
  'omnibus_pacbio_metag_v10_data': { x: 600, y: 1372 },
  'omnibus_pacbio_metag_v11_data': { x: 880, y: 1372 },
  'omnibus_sample_context': { x: 1160, y: 1372 },
  'omnibus_standard_metag_v0_data': { x: 40, y: 1408 },
  'omnibus_standard_metag_v101_bioinformatics': { x: 320, y: 1408 },
  'omnibus_standard_metag_v101_data': { x: 600, y: 1408 },
  'omnibus_standard_metag_v90_bioinformatics': { x: 880, y: 1408 },
  'omnibus_standard_metag_v90_data': { x: 1160, y: 1408 },
  'omnibus_standard_metat_v10_data': { x: 40, y: 1444 },
  'omnibus_tellseq_absquant_v10_data': { x: 320, y: 1444 },
  'omnibus_tellseq_metag_v10_data': { x: 600, y: 1444 },
  'replicated_samples': { x: 880, y: 1444 },
  'run_capability': { x: 1160, y: 1444 },
  'run_capability_absquant_mass': { x: 40, y: 1480 },
  'run_capability_absquant_surface_area': { x: 320, y: 1480 },
  'run_capability_absquant_volume': { x: 600, y: 1480 },
  'run_derived_capability': { x: 880, y: 1480 }
};

var svg = document.getElementById('canvas');
var tooltip = document.getElementById('tooltip');
var transform = { x: 20, y: 20, k: 1 };

function applyTransform() {
  var g = document.getElementById('main-group');
  g.setAttribute('transform', 'translate(' + transform.x + ',' + transform.y + ') scale(' + transform.k + ')');
}

function resetView() {
  transform = { x: 20, y: 50, k: 0.85 };
  applyTransform();
}

function svgEl(tag, attrs) {
  var el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (var k in attrs) {
    if (attrs.hasOwnProperty(k)) el.setAttribute(k, attrs[k]);
  }
  return el;
}

function clearElement(el) {
  while (el.firstChild) {
    el.removeChild(el.firstChild);
  }
}

function render() {
  clearElement(svg);
  var mainG = svgEl('g', { id: 'main-group' });
  svg.appendChild(mainG);

  var linkG = svgEl('g', { id: 'links' });
  mainG.appendChild(linkG);

  var fkLinks = [];
  for (var ti = 0; ti < SCHEMA.tables.length; ti++) {
    var t = SCHEMA.tables[ti];
    var pos = POSITIONS[t.id];
    for (var ci = 0; ci < t.columns.length; ci++) {
      var col = t.columns[ci];
      if (col.fk) {
        var targetPos = POSITIONS[col.fk];
        if (!targetPos) continue;
        var fromX = pos.x;
        var fromY = pos.y + HEADER_H + ci * ROW_H + ROW_H / 2;
        var toX = targetPos.x + COL_W;
        var toY = targetPos.y + HEADER_H / 2;
        fkLinks.push({ from: { x: fromX, y: fromY }, to: { x: toX, y: toY } });
      }
    }
  }

  for (var li = 0; li < fkLinks.length; li++) {
    var link = fkLinks[li];
    var dx = link.to.x - link.from.x;
    var dy = link.to.y - link.from.y;
    var cx1 = link.from.x + dx * 0.3;
    var cx2 = link.to.x - dx * 0.3;
    var path = svgEl('path', {
      class: 'link-line',
      d: 'M' + link.from.x + ',' + link.from.y + ' C' + cx1 + ',' + link.from.y + ' ' + cx2 + ',' + link.to.y + ' ' + link.to.x + ',' + link.to.y
    });
    linkG.appendChild(path);
  }

  for (var ti2 = 0; ti2 < SCHEMA.tables.length; ti2++) {
    (function(t) {
      var pos = POSITIONS[t.id];
      var h = tableHeight(t);
      var color = CATEGORY_COLORS[t.category];
      var g = svgEl('g', { class: 'table-group', 'data-id': t.id });
      g.setAttribute('transform', 'translate(' + pos.x + ',' + pos.y + ')');

      g.appendChild(svgEl('rect', { class: 'table-bg', width: COL_W, height: h }));

      g.appendChild(svgEl('rect', {
        class: 'table-header-bg', width: COL_W, height: HEADER_H,
        fill: color, opacity: 0.9
      }));
      var headerText = svgEl('text', {
        class: 'table-header-text', x: 10, y: HEADER_H - 8
      });
      headerText.textContent = t.id;
      g.appendChild(headerText);

      t.columns.forEach(function(col, i) {
        var y = HEADER_H + i * ROW_H + ROW_H - 4;
        var cls = col.pk ? 'column-text pk' : col.fk ? 'column-text fk' : 'column-text';

        var nameText = svgEl('text', { class: cls, x: 10, y: y });
        nameText.textContent = (col.pk ? '\u26BF ' : '') + col.name;
        g.appendChild(nameText);

        var typeText = svgEl('text', { class: 'type-text', x: COL_W - 10, y: y, 'text-anchor': 'end' });
        typeText.textContent = col.type;
        g.appendChild(typeText);

        if (col.fk) {
          var badge = svgEl('text', {
            class: 'badge', x: COL_W - 10, y: y - 10, 'text-anchor': 'end',
            fill: 'var(--fk)', opacity: 0.5
          });
          badge.textContent = '\u2192 ' + col.fk;
          g.appendChild(badge);
        }

        if (col.note) {
          var hoverRect = svgEl('rect', {
            x: 0, y: HEADER_H + i * ROW_H, width: COL_W, height: ROW_H,
            fill: 'transparent', cursor: 'help'
          });
          hoverRect.addEventListener('mouseenter', function(e) {
            tooltip.style.display = 'block';
            tooltip.textContent = col.note;
            tooltip.style.left = (e.clientX + 12) + 'px';
            tooltip.style.top = (e.clientY - 8) + 'px';
          });
          hoverRect.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
          hoverRect.addEventListener('mousemove', function(e) {
            tooltip.style.left = (e.clientX + 12) + 'px';
            tooltip.style.top = (e.clientY - 8) + 'px';
          });
          g.appendChild(hoverRect);
        }
      });

      var dragStart = null;
      g.addEventListener('mousedown', function(e) {
        e.stopPropagation();
        dragStart = { mx: e.clientX, my: e.clientY, ox: pos.x, oy: pos.y };
      });
      window.addEventListener('mousemove', function(e) {
        if (!dragStart) return;
        pos.x = dragStart.ox + (e.clientX - dragStart.mx) / transform.k;
        pos.y = dragStart.oy + (e.clientY - dragStart.my) / transform.k;
        render();
      });
      window.addEventListener('mouseup', function() { dragStart = null; });

      mainG.appendChild(g);
    })(SCHEMA.tables[ti2]);
  }

  for (var vi = 0; vi < SCHEMA.views.length; vi++) {
    (function(v) {
      var pos = VIEW_POSITIONS[v.id];
      var g = svgEl('g', { class: 'view-group' });
      g.setAttribute('transform', 'translate(' + pos.x + ',' + pos.y + ')');

      var w = Math.max(v.id.length * 7.2 + 20, 160);
      g.appendChild(svgEl('rect', { class: 'view-bg', width: w, height: 28 }));
      g.appendChild(svgEl('rect', { class: 'view-header-bg', width: w, height: 28 }));
      var vText = svgEl('text', { class: 'view-header-text', x: 8, y: 18 });
      vText.textContent = v.id;
      g.appendChild(vText);

      var hoverRect = svgEl('rect', { x: 0, y: 0, width: w, height: 28, fill: 'transparent', cursor: 'help' });
      hoverRect.addEventListener('mouseenter', function(e) {
        tooltip.style.display = 'block';
        tooltip.textContent = v.note;
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY - 8) + 'px';
      });
      hoverRect.addEventListener('mouseleave', function() { tooltip.style.display = 'none'; });
      hoverRect.addEventListener('mousemove', function(e) {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY - 8) + 'px';
      });
      g.appendChild(hoverRect);

      var vDrag = null;
      g.addEventListener('mousedown', function(e) {
        e.stopPropagation();
        vDrag = { mx: e.clientX, my: e.clientY, ox: pos.x, oy: pos.y };
      });
      window.addEventListener('mousemove', function(e) {
        if (!vDrag) return;
        pos.x = vDrag.ox + (e.clientX - vDrag.mx) / transform.k;
        pos.y = vDrag.oy + (e.clientY - vDrag.my) / transform.k;
        render();
      });
      window.addEventListener('mouseup', function() { vDrag = null; });

      mainG.appendChild(g);
    })(SCHEMA.views[vi]);
  }

  applyTransform();
}

var panStart = null;
svg.addEventListener('mousedown', function(e) {
  if (e.target === svg || e.target.id === 'main-group') {
    panStart = { mx: e.clientX, my: e.clientY, ox: transform.x, oy: transform.y };
  }
});
window.addEventListener('mousemove', function(e) {
  if (!panStart) return;
  transform.x = panStart.ox + (e.clientX - panStart.mx);
  transform.y = panStart.oy + (e.clientY - panStart.my);
  applyTransform();
});
window.addEventListener('mouseup', function() { panStart = null; });

svg.addEventListener('wheel', function(e) {
  e.preventDefault();
  var scaleFactor = e.deltaY < 0 ? 1.08 : 0.92;
  var newK = Math.max(0.3, Math.min(2.5, transform.k * scaleFactor));
  var rect = svg.getBoundingClientRect();
  var cx = e.clientX - rect.left;
  var cy = e.clientY - rect.top;
  transform.x = cx - (cx - transform.x) * (newK / transform.k);
  transform.y = cy - (cy - transform.y) * (newK / transform.k);
  transform.k = newK;
  applyTransform();
});

function autoLayout() {
  var tables = SCHEMA.tables;
  for (var iter = 0; iter < 50; iter++) {
    for (var i = 0; i < tables.length; i++) {
      for (var j = i + 1; j < tables.length; j++) {
        var pi = POSITIONS[tables[i].id], pj = POSITIONS[tables[j].id];
        var dx = pj.x - pi.x, dy = pj.y - pi.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        var minDist = 300;
        if (dist < minDist) {
          var force = (minDist - dist) * 0.05;
          var fx = (dx / dist) * force, fy = (dy / dist) * force;
          pi.x -= fx; pi.y -= fy;
          pj.x += fx; pj.y += fy;
        }
      }
    }
  }
  render();
}

render();
resetView();
</script>
